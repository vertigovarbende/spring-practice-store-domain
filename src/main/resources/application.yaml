spring:
  application:
    name: bookstore
  datasource:
    url: "jdbc:postgresql://${DB_IP:localhost}:${DB_PORT:5432}/bookstore"
    username: "${DB_USERNAME:app}"
    password: "${DB_PASSWORD:s3cr3t}"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
        jdbc.time_zone: UTC
    open-in-view: false
  flyway:
    locations: classpath:db/migration

  mvc:
    problemdetails:
      enabled: true


